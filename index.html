<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castillo | Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定義背景光暈動畫 */
        .spotlight {
            background: radial-gradient(circle at 50% -20%, #1e40af 0%, rgba(17, 24, 39, 0) 70%);
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen spotlight">
    <!-- 導航欄 -->
    <nav class="p-6 flex justify-between items-center border-b border-gray-800 bg-gray-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="text-2xl font-black tracking-widest text-white uppercase">
            <span class="bg-blue-600 px-3 py-1 rounded-lg shadow-[0_0_15px_rgba(37,99,235,0.5)]">Castillo</span> 
            <span class="ml-1 text-gray-400 font-light">Test</span>
        </div>
    </nav>

    <!-- 主要內容 -->
    <main class="max-w-xl mx-auto py-24 px-6">
        <header class="text-center mb-16">
            <h1 class="text-5xl font-extrabold tracking-tight mb-3 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-500">
                Item
            </h1>
            <p class="text-gray-500 text-sm tracking-widest uppercase">Select an exploration</p>
        </header>
        
        <div class="space-y-6">
            <!-- Aurora Tour 卡片 -->
            <a href="Aurora Tour.html" class="block group relative">
                <div class="absolute -inset-0.5 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl blur opacity-20 group-hover:opacity-50 transition duration-500"></div>
                <div class="relative p-8 bg-gray-800 border border-gray-700 rounded-2xl leading-none flex items-center justify-between hover:bg-gray-800/80 transition duration-300">
                    <div class="flex items-center space-x-4">
                        <div class="w-12 h-12 bg-blue-900/30 rounded-full flex items-center justify-center border border-blue-500/30 text-blue-400 group-hover:scale-110 transition-transform">
                            ✨
                        </div>
                        <div>
                            <span class="text-xl font-semibold text-white tracking-wide">Aurora Tour</span>
                            <p class="text-gray-500 text-xs mt-1 font-light italic">Start your journey here</p>
                        </div>
                    </div>
                    <span class="text-blue-500 font-bold group-hover:translate-x-3 transition-transform duration-300">
                        <svg xmlns="http://w3.org" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </span>
                </div>
            </a>

            <!-- 隱藏的測試項目 (註釋保留) -->
            <!-- 
            <a href="page2.html" class="block p-6 bg-gray-800 border border-gray-700 rounded-xl hover:border-blue-500 hover:bg-gray-700 transition group shadow-lg opacity-50">
                <div class="flex justify-between items-center">
                    <span class="text-xl font-medium">2. 測試 2 (Coming Soon)</span>
                    <span>🔒</span>
                </div>
            </a>
            -->
        </div>

        <!-- 底部裝飾線 -->
        <footer class="mt-32 border-t border-gray-800 pt-8 text-center">
            <p class="text-gray-600 text-xs font-light">&copy; 2026 Castillo Digital Studio</p>
        </footer>
    </main>
</body>
</html>
