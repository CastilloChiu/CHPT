<!DOCTYPE html>
<html lang="zh-Hant">
<head>

</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <!-- 導覽列 -->
    <nav class="p-6 flex justify-between items-center bg-white shadow-sm">
        <div class="text-2xl font-bold text-blue-600">BrandLogo</div>

        </div>
    </nav>

    <header class="py-20 px-6 text-center">
        <h1 class="text-5xl font-extrabold mb-4">歡迎來到我的網站</h1>
        <p class="text-xl text-gray-600 mb-8">在這裡，我們提供最簡單、最高效的解決方案。</p>

    <!-- 特色介紹 -->
    <section class="max-w-6xl mx-auto py-12 px-6 grid md:grid-cols-3 gap-8">

            <p class="text-gray-600">無論是手機或電腦，外觀都一樣完美。</p>
        </div>
        <div class="p-6 bg-white rounded-xl shadow-sm border border-gray-100">
            <h3 class="text-xl font-bold mb-2">完全免費</h3>
            <p class="text-gray-600">開源且友善，適合各種小型專案。</p>
        </div>
    </section>
</body>
